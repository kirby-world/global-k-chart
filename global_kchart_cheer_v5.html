<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global K Chart – 최종</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@latest/dist/web/static/pretendard.css" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #22C55E; --primary-dark: #16A34A;
  --accent: #3D3BF3;
  --bg: #0A0A0A; --surface: #141414; --surface-2: #1E1E1E;
  --card-blue: #2424D8; --card-blue-dark: #1616a0;
  --text-primary: #FFF; --text-secondary: #A0A0A0; --text-muted: #505050;
  --radius: 16px; --radius-sm: 10px;
  --font: 'Pretendard', -apple-system, sans-serif;
}
body { background:#1a1a2e; display:flex; justify-content:center; align-items:flex-start; min-height:100vh; font-family:var(--font); padding:32px 16px; gap:28px; flex-wrap:wrap; }
.phone-wrap { display:flex; flex-direction:column; align-items:center; gap:10px; }
.phone-label { font-size:11px; font-weight:700; color:#666; letter-spacing:0.06em; text-transform:uppercase; }
.phone { width:390px; height:844px; background:var(--bg); border-radius:44px; overflow:hidden; position:relative; box-shadow:0 0 0 10px #222, 0 32px 80px rgba(0,0,0,0.7); border:1px solid #333; }
.screen { width:100%; height:100%; overflow:hidden; position:relative; display:flex; flex-direction:column; }

/* 상태바 */
.status-bar { display:flex; justify-content:space-between; align-items:center; padding:12px 24px 4px; font-size:12px; font-weight:700; color:#fff; flex-shrink:0; }
.status-icons { display:flex; gap:6px; align-items:center; }

/* 히어로 */
.hero { position:relative; height:148px; overflow:hidden; flex-shrink:0; }
.hero-bg { position:absolute; inset:0; background:linear-gradient(135deg,#062a06 0%,#08183a 45%,#160828 100%); }
.hero-bars { position:absolute; right:-18px; top:-8px; display:flex; gap:5px; align-items:flex-end; opacity:0.4; }
.hero-bar { width:20px; border-radius:4px 4px 0 0; background:linear-gradient(180deg,#22C55E,#16A34A); }
.hero-content { position:relative; z-index:2; padding:16px 20px 0; }
.hero-nav { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.btn-icon { width:30px; height:30px; background:rgba(255,255,255,0.1); border:none; border-radius:50%; color:#fff; font-size:14px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
.hero-title { font-size:26px; font-weight:800; color:#fff; letter-spacing:-0.02em; }
.hero-title span { color:var(--primary); }

/* 차트 탭 */
.chart-tabs { display:flex; gap:8px; padding:10px 20px; background:var(--bg); flex-shrink:0; }
.chart-tab { padding:6px 18px; border-radius:100px; font-size:14px; font-weight:600; border:none; cursor:pointer; transition:all 0.2s; font-family:var(--font); }
.chart-tab.active { background:var(--primary); color:#000; }
.chart-tab.inactive { background:var(--surface-2); color:var(--text-secondary); }

/* 날짜바 */
.date-bar { display:flex; justify-content:space-between; align-items:center; padding:7px 20px; background:var(--bg); border-bottom:1px solid rgba(255,255,255,0.05); flex-shrink:0; }
.date-filter-btn { display:flex; align-items:center; gap:5px; background:var(--surface-2); border:none; border-radius:100px; padding:5px 12px; color:var(--text-secondary); font-size:12px; font-weight:600; font-family:var(--font); cursor:pointer; }
.chart-info-btn { font-size:12px; color:var(--text-muted); background:none; border:none; cursor:pointer; font-family:var(--font); }

/* 스크롤 영역 */
.scroll-body { flex:1; overflow-y:auto; padding-bottom:80px; }
.scroll-body::-webkit-scrollbar { display:none; }

/* ═══════════════════════════════
   팬덤 반응 순위 섹션 (일간 상단)
═══════════════════════════════ */
.fandom-rank-section {
  margin:10px 16px 4px;
  background:linear-gradient(135deg,rgba(36,36,216,0.25),rgba(34,197,94,0.1));
  border:1px solid rgba(255,255,255,0.1);
  border-radius:var(--radius);
  overflow:hidden;
}
.fandom-rank-header {
  display:flex; justify-content:space-between; align-items:center;
  padding:12px 14px 10px;
}
.fandom-rank-title { font-size:13px; font-weight:800; color:#fff; display:flex; align-items:center; gap:6px; }
.live-dot { width:6px; height:6px; border-radius:50%; background:var(--primary); animation:pulse 1.4s infinite; flex-shrink:0; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.5;transform:scale(0.8);} }
.fandom-rank-sub { font-size:10px; color:var(--text-muted); font-weight:500; }

.fandom-rank-list { padding:0 14px; }
.fandom-rank-item {
  display:flex; align-items:center; gap:10px;
  padding:7px 0;
  border-top:1px solid rgba(255,255,255,0.06);
  transition:all 0.2s;
}
.fandom-rank-item.hidden { display:none; }
.fandom-rank-pos { width:18px; font-size:13px; font-weight:800; color:var(--text-muted); text-align:center; flex-shrink:0; }
.fandom-rank-pos.top1 { color:#FFD700; }
.fandom-rank-pos.top2 { color:#C0C0C0; }
.fandom-rank-pos.top3 { color:#CD7F32; }
.fandom-rank-emoji { font-size:20px; flex-shrink:0; }
.fandom-rank-info { flex:1; }
.fandom-rank-name { font-size:13px; font-weight:700; color:#fff; }
.fandom-rank-fandom { font-size:10px; font-weight:600; color:var(--primary); margin-top:1px; }
.fandom-rank-bar-wrap { margin-top:3px; height:4px; background:rgba(255,255,255,0.08); border-radius:2px; overflow:hidden; }
.fandom-rank-bar { height:100%; border-radius:2px; transition:width 0.8s ease; }
.fandom-rank-count { font-size:12px; font-weight:700; color:rgba(255,255,255,0.7); flex-shrink:0; }
.fandom-rank-change { font-size:10px; font-weight:700; flex-shrink:0; width:28px; text-align:right; }
.change-up { color:var(--primary); }
.change-same { color:var(--text-muted); }
.change-down { color:#EF4444; }

/* 더보기 버튼 */
.fandom-more-btn {
  width:100%; padding:10px; background:none; border:none; border-top:1px solid rgba(255,255,255,0.06);
  color:var(--text-muted); font-size:12px; font-weight:600; font-family:var(--font);
  cursor:pointer; display:flex; align-items:center; justify-content:center; gap:4px;
  transition:color 0.2s;
}
.fandom-more-btn:active { color:var(--text-secondary); }
.fandom-more-arrow { transition:transform 0.3s; display:inline-block; }
.fandom-more-arrow.open { transform:rotate(180deg); }

/* ═══════════════════════════════
   주간·월간 결과 섹션 (차트 상단)
═══════════════════════════════ */
.result-section {
  margin:10px 16px 4px;
  border-radius:var(--radius);
  overflow:hidden;
}
/* 주간 결과 */
.weekly-result {
  background:linear-gradient(135deg,rgba(36,36,216,0.2),rgba(22,163,74,0.12));
  border:1px solid rgba(255,255,255,0.1);
}
/* 월간 결과 */
.monthly-result {
  background:linear-gradient(135deg,rgba(124,58,237,0.2),rgba(236,72,153,0.12));
  border:1px solid rgba(255,255,255,0.1);
}
.result-header { padding:13px 14px 10px; }
.result-title { font-size:13px; font-weight:800; color:#fff; margin-bottom:2px; }
.result-desc { font-size:11px; color:var(--text-muted); }
.result-podium { display:flex; align-items:flex-end; gap:6px; padding:10px 14px 12px; }
.podium-item { flex:1; text-align:center; }
.podium-item.first { order:2; }
.podium-item.second { order:1; }
.podium-item.third { order:3; }
.podium-emoji-wrap { position:relative; display:inline-block; margin-bottom:4px; }
.podium-emoji { font-size:22px; }
.podium-crown { position:absolute; top:-10px; left:50%; transform:translateX(-50%); font-size:14px; }
.podium-name { font-size:10px; color:rgba(255,255,255,0.6); font-weight:600; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.podium-count { font-size:13px; font-weight:800; color:#fff; }
.podium-bar-section { display:flex; align-items:flex-end; gap:6px; padding:0 14px; height:36px; }
.podium-bar-col { flex:1; display:flex; align-items:flex-end; justify-content:center; }
.podium-bar { width:100%; border-radius:3px 3px 0 0; }
.result-total { padding:10px 14px 13px; border-top:1px solid rgba(255,255,255,0.08); display:flex; justify-content:space-between; align-items:center; }
.result-total-text { font-size:11px; color:var(--text-muted); }
.result-total-text strong { color:#fff; }
.result-share-btn { font-size:10px; font-weight:700; color:var(--primary); background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.2); border-radius:100px; padding:4px 10px; cursor:pointer; font-family:var(--font); }

/* 아티스트 행 */
.artist-row { display:flex; align-items:center; padding:11px 20px; cursor:pointer; transition:background 0.15s; border-bottom:1px solid rgba(255,255,255,0.04); }
.artist-row:active { background:rgba(255,255,255,0.04); }
.rank-num { width:34px; text-align:center; flex-shrink:0; }
.rank-num .num { font-size:19px; font-weight:800; color:#fff; }
.rank-num .change { font-size:10px; font-weight:600; margin-top:1px; }
.ch-new{color:var(--primary);} .ch-up{color:#22C55E;} .ch-dn{color:#EF4444;} .ch-sm{color:var(--text-muted);}
.artist-img { width:50px; height:50px; border-radius:50%; margin:0 12px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:22px; }
.img-jennie{background:linear-gradient(135deg,#8B4513,#CD853F);}
.img-ive{background:linear-gradient(135deg,#1a1a4a,#6a1a6a);}
.img-cortis{background:linear-gradient(135deg,#1a3a1a,#3a3a1a);}
.img-aespa{background:linear-gradient(135deg,#3a1a4a,#1a1a4a);}
.img-le{background:linear-gradient(135deg,#4a1a1a,#1a2a4a);}
.artist-name { flex:1; font-size:15px; font-weight:600; color:#fff; }
.row-toggle { width:28px; height:28px; background:var(--surface-2); border:none; border-radius:50%; color:var(--text-secondary); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:11px; transition:all 0.25s; flex-shrink:0; }
.row-toggle.open { background:var(--accent); color:#fff; transform:rotate(180deg); }

/* 확장 카드 */
.expand-card { background:var(--card-blue); border-radius:var(--radius); margin:0 16px 8px; overflow:hidden; animation:slideDown 0.22s ease; }
@keyframes slideDown { from{opacity:0;transform:translateY(-5px);} to{opacity:1;transform:translateY(0);} }
.expand-inner { padding:14px 16px 10px; }
.section-title { font-size:11px; font-weight:700; color:rgba(255,255,255,0.45); margin-bottom:8px; text-transform:uppercase; letter-spacing:0.06em; }
.country-ranks { display:grid; grid-template-columns:1fr 1fr 1fr; background:rgba(0,0,0,0.2); border-radius:var(--radius-sm); overflow:hidden; margin-bottom:12px; }
.country-item { text-align:center; padding:9px 4px; }
.country-item+.country-item { border-left:1px solid rgba(255,255,255,0.1); }
.country-flag { font-size:16px; margin-bottom:2px; }
.country-name { font-size:10px; color:rgba(255,255,255,0.45); margin-bottom:3px; }
.country-rank { font-size:20px; font-weight:800; color:#fff; }
.divider { height:1px; background:rgba(255,255,255,0.12); margin:10px 0; }
.song-row { display:flex; align-items:center; gap:10px; }
.song-thumb { width:36px; height:36px; border-radius:7px; background:linear-gradient(135deg,#1a1a4a,#2a2a6a); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:16px; }
.song-info { flex:1; }
.song-title { font-size:12px; font-weight:700; color:#fff; }
.song-artist { font-size:10px; color:rgba(255,255,255,0.5); margin-top:1px; }
.play-btn { width:28px; height:28px; background:linear-gradient(135deg,#7C3AED,#22C55E); border-radius:50%; border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:11px; color:#fff; flex-shrink:0; }

/* 일간 반응 (파란 블록) */
.reaction-section { padding:10px 16px 14px; border-top:1px solid rgba(255,255,255,0.1); }
.reaction-label-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.reaction-label { font-size:11px; color:rgba(255,255,255,0.45); font-weight:600; }
.reaction-no-login { font-size:10px; color:var(--primary); font-weight:600; }
.reaction-btns { display:flex; gap:7px; }
.reaction-btn { display:flex; align-items:center; gap:4px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1); border-radius:100px; padding:7px 13px; font-size:13px; color:rgba(255,255,255,0.85); cursor:pointer; font-family:var(--font); transition:all 0.18s; }
.reaction-btn.active { background:rgba(34,197,94,0.15); border-color:var(--primary); color:var(--primary); transform:scale(1.05); }
.reaction-btn:active { transform:scale(0.95); }
.reaction-count { font-size:12px; font-weight:600; }

/* 주간·월간 반응 결과 (파란 블록) */
.result-in-card { padding:12px 16px 14px; border-top:1px solid rgba(255,255,255,0.1); }
.result-in-card-title { font-size:12px; font-weight:700; color:rgba(255,255,255,0.55); margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; }
.result-in-card-rank { font-size:11px; font-weight:700; color:var(--primary); }
.result-bar-list { display:flex; flex-direction:column; gap:6px; margin-bottom:8px; }
.result-bar-row { display:flex; align-items:center; gap:8px; }
.result-bar-emoji { font-size:16px; flex-shrink:0; width:20px; text-align:center; }
.result-bar-track { flex:1; height:6px; background:rgba(255,255,255,0.08); border-radius:3px; overflow:hidden; }
.result-bar-fill { height:100%; border-radius:3px; }
.result-bar-num { font-size:11px; font-weight:700; color:rgba(255,255,255,0.65); width:36px; text-align:right; flex-shrink:0; }
.result-total-row { font-size:11px; color:rgba(255,255,255,0.4); padding-top:6px; border-top:1px solid rgba(255,255,255,0.08); }
.result-total-row strong { color:rgba(255,255,255,0.8); }

/* 롤링 */
.msg-rolling-section { padding:0 16px 0; }
.msg-rolling-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:7px; }
.msg-rolling-title { font-size:11px; font-weight:700; color:rgba(255,255,255,0.6); }
.msg-count-badge { font-size:10px; font-weight:600; color:rgba(255,255,255,0.3); }
.rolling-window { height:48px; overflow:hidden; position:relative; border-radius:var(--radius-sm); background:rgba(0,0,0,0.22); }
.rolling-track { position:absolute; top:0; left:0; right:0; transition:transform 0.52s cubic-bezier(0.25,0.46,0.45,0.94); }
.rolling-item { height:48px; display:flex; align-items:center; gap:8px; padding:0 11px; }
.rolling-avatar { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; color:#fff; flex-shrink:0; }
.rolling-body { flex:1; min-width:0; }
.rolling-user { font-size:10px; color:rgba(255,255,255,0.35); font-weight:600; margin-bottom:2px; }
.rolling-text { font-size:12px; color:rgba(255,255,255,0.9); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.rolling-flag { font-size:14px; flex-shrink:0; }
.default-msg { height:48px; display:flex; align-items:center; gap:9px; padding:0 11px; background:rgba(0,0,0,0.22); border-radius:var(--radius-sm); }
.default-msg-label { font-size:10px; color:var(--primary); font-weight:700; margin-bottom:1px; }
.default-msg-text { font-size:11px; color:rgba(255,255,255,0.78); line-height:1.3; }

/* CTA */
.card-actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:10px 16px 14px; }
.btn-all { padding:10px; background:rgba(255,255,255,0.1); border:1.5px solid rgba(255,255,255,0.15); border-radius:var(--radius-sm); color:rgba(255,255,255,0.8); font-size:12px; font-weight:600; font-family:var(--font); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:4px; transition:all 0.2s; }
.btn-write { padding:10px; background:var(--primary); border:none; border-radius:var(--radius-sm); color:#000; font-size:12px; font-weight:700; font-family:var(--font); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:4px; transition:all 0.2s; }
.btn-write:active { background:var(--primary-dark); transform:scale(0.97); }

/* 네비 */
.nav-bar { position:absolute; bottom:0; left:0; right:0; height:76px; background:rgba(10,10,10,0.97); backdrop-filter:blur(12px); border-top:1px solid rgba(255,255,255,0.07); display:flex; justify-content:space-around; align-items:center; padding-bottom:14px; z-index:100; }
.nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; }
.nav-icon { font-size:20px; }
.nav-label { font-size:10px; color:var(--text-muted); font-weight:500; }

/* 상세 페이지 */
.detail-page { position:absolute; inset:0; background:var(--bg); z-index:50; transform:translateX(100%); transition:transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94); display:flex; flex-direction:column; }
.detail-page.open { transform:translateX(0); }
.detail-header { background:linear-gradient(160deg,var(--card-blue) 0%,var(--card-blue-dark) 100%); padding:0 20px 16px; flex-shrink:0; }
.detail-status { display:flex; justify-content:space-between; padding:11px 0 6px; font-size:12px; font-weight:700; color:#fff; }
.detail-nav { display:flex; justify-content:space-between; align-items:center; margin-bottom:13px; }
.detail-back { display:flex; align-items:center; gap:5px; background:rgba(255,255,255,0.12); border:none; border-radius:100px; padding:6px 13px; color:#fff; font-size:13px; font-weight:600; font-family:var(--font); cursor:pointer; }
.detail-badge { background:rgba(255,255,255,0.14); border-radius:100px; padding:5px 11px; font-size:11px; color:rgba(255,255,255,0.85); font-weight:700; }
.detail-artist-row { display:flex; align-items:center; gap:12px; }
.detail-artist-img { width:54px; height:54px; border-radius:50%; border:2px solid rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
.detail-artist-name { font-size:20px; font-weight:800; color:#fff; letter-spacing:-0.02em; }
.detail-artist-meta { font-size:11px; color:rgba(255,255,255,0.45); margin-top:2px; font-weight:500; }
.detail-trophy { font-size:28px; margin-left:auto; }
.detail-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1px; background:rgba(255,255,255,0.08); margin:12px 20px 0; border-radius:var(--radius-sm); overflow:hidden; flex-shrink:0; }
.stat-item { background:var(--surface); padding:10px 6px; text-align:center; }
.stat-flag { font-size:14px; margin-bottom:2px; }
.stat-label { font-size:10px; color:var(--text-muted); margin-bottom:2px; }
.stat-value { font-size:15px; font-weight:800; color:#fff; }
.detail-participation { display:flex; justify-content:space-between; align-items:center; padding:9px 20px 5px; flex-shrink:0; }
.participation-text { font-size:13px; color:var(--text-secondary); }
.participation-text strong { color:#fff; }
.participation-countries { font-size:11px; color:var(--text-muted); }
.detail-msg-list { flex:1; overflow-y:auto; padding:0 20px 8px; }
.detail-msg-list::-webkit-scrollbar { display:none; }
.detail-msg-item { background:var(--surface); border-radius:var(--radius-sm); padding:12px; margin-bottom:8px; animation:fadeUp 0.25s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(5px);} to{opacity:1;transform:translateY(0);} }
.detail-msg-item.official { background:rgba(34,197,94,0.07); border:1px solid rgba(34,197,94,0.2); }
.official-badge { display:inline-flex; align-items:center; gap:3px; background:var(--primary); color:#000; font-size:10px; font-weight:700; padding:2px 7px; border-radius:100px; margin-bottom:6px; }
.detail-msg-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.detail-msg-user { display:flex; align-items:center; gap:6px; }
.detail-msg-avatar { width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; color:#fff; }
.detail-msg-name { font-size:12px; font-weight:700; color:var(--text-secondary); }
.detail-msg-flag { font-size:13px; }
.detail-msg-time { font-size:11px; color:var(--text-muted); }
.detail-msg-text { font-size:14px; color:#fff; line-height:1.5; }
.detail-msg-like { display:flex; align-items:center; gap:4px; margin-top:8px; font-size:12px; color:var(--text-muted); cursor:pointer; }
.detail-input-bar { flex-shrink:0; background:rgba(10,10,10,0.97); backdrop-filter:blur(16px); border-top:1px solid rgba(255,255,255,0.08); padding:10px 16px 26px; }

      +'<button class="chart-tab active" id="'+id+'-tab-daily" onclick="window._ph[\''+id+'\'].switchTab(\'daily\')">일간</button>'

          +'</div></div>'

  // ── 컨트롤러

    switchTab: function(tab) {
      currentTab = tab;
      ['daily','weekly','monthly'].forEach(function(t){
        document.getElementById(id+'-tab-'+t).className = 'chart-tab'+(t===tab?' active':' inactive');
      });
      var labels = {daily:'2025.01.16', weekly:'2025.01.09 ~ 2025.01.16', monthly:'2025년 1월'};
      document.getElementById(id+'-date').textContent = labels[tab];
      document.getElementById(id+'-fandom-section').style.display = tab==='daily' ? 'block' : 'none';
      document.getElementById(id+'-weekly-result').style.display = tab==='weekly' ? 'block' : 'none';
      document.getElementById(id+'-monthly-result').style.display = tab==='monthly' ? 'block' : 'none';
      phone.querySelectorAll('.cheer-btn').forEach(function(b){
        b.style.display = tab==='daily' ? 'flex' : 'none';
      });
      // 열린 카드 닫기
      Object.keys(openedRows).forEach(function(n){
        if(openedRows[n]){
          var exp = document.getElementById(id+'-exp-'+n);
          var tog = document.getElementById(id+'-tog-'+n);
          if(exp) exp.style.display = 'none';
          if(tog) tog.classList.remove('open');
          openedRows[n] = false;
        }
      });
    },
    toggle: function(n) {
      var exp = document.getElementById(id+'-exp-'+n);
      var tog = document.getElementById(id+'-tog-'+n);
      if(!exp) return;
      openedRows[n] = !openedRows[n];
      exp.style.display = openedRows[n] ? 'block' : 'none';
      if(openedRows[n]) tog.classList.add('open'); else tog.classList.remove('open');
    },
    toggleMore: function() {
      fandomExpanded = !fandomExpanded;
      var ex1 = document.getElementById(id+'-rank-extra1');
      var ex2 = document.getElementById(id+'-rank-extra2');
      var arrow = document.getElementById(id+'-more-arrow');
      var btn = document.getElementById(id+'-more-btn');
      if(ex1) ex1.style.display = fandomExpanded ? 'flex' : 'none';
      if(ex2) ex2.style.display = fandomExpanded ? 'flex' : 'none';
      arrow.classList.toggle('open', fandomExpanded);
      btn.innerHTML = (fandomExpanded?'접기':'더보기')+' <span class="fandom-more-arrow'+(fandomExpanded?' open':'')+'">▼</span>';
    },
    cheer: function(n) {
      if(currentTab !== 'daily') return;
      if(cheered[n]) return;
      cheered[n] = true;
      counts[n]++;
      var cb = document.getElementById(id+'-cb-'+n);
      var cc = document.getElementById(id+'-cc-'+n);
      cb.classList.add('cheered');
      cb.querySelector('.cheer-icon').textContent = '💚';
      cc.textContent = fmt(counts[n]);
      if(isLoggedIn) {
        relayDay++;
        relayTotal++;
        var ntxt = document.getElementById(id+'-nudge-txt');
        if(ntxt) ntxt.innerHTML = '응원 완료🎉 내 링크로 <b>오늘 '+relayDay+'명 · 누적 '+relayTotal+'명</b>이 응원했어요';
      }
      var nudge = document.getElementById(id+'-nudge');
      nudge.classList.add('show');
      if(nudgeTimer) clearTimeout(nudgeTimer);
      nudgeTimer = setTimeout(function(){ nudge.classList.remove('show'); }, 5000);
    },
    openLogin: function() {
      var sheet = document.getElementById(id+'-login-sheet');
      if(sheet) sheet.classList.add('show');
    },
    loginDone: function() {
      var sheet = document.getElementById(id+'-login-sheet');
      if(sheet) sheet.classList.remove('show');
      var t = document.getElementById(id+'-toast');
      t.textContent = isLoggedIn ? '✅ 로그인 완료! 매시간 응원할 수 있어요' : '✅ 구글 로그인 완료! 오늘 1회 응원할 수 있어요';
      t.classList.add('show');
      setTimeout(function(){ t.classList.remove('show'); }, 2500);
    },
    share: function() {
      var t = document.getElementById(id+'-toast');
      t.textContent = '🔗 응원 링크가 복사됐어요!';
      t.classList.add('show');
      setTimeout(function(){ t.classList.remove('show'); }, 2000);
    }
  };
}
